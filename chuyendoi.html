<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chuyển định dạng Câu hỏi Trắc nghiệm</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(-45deg, #ff9ff3, #feca57, #48dbfb, #1dd1a1);
      background-size: 400% 400%;
      animation: glow 15s ease infinite;
      color: #2d3436;
    }

    @keyframes glow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea, pre {
      width: 100%;
      padding: 15px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    textarea {
      height: 220px;
      resize: vertical;
      margin-bottom: 20px;
    }

    pre {
      background: #f1f1f1;
      white-space: pre-wrap;
      min-height: 200px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      background-color: #ff7675;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #d63031;
    }

    h3 {
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h2>📌 Chuyển định dạng câu hỏi trắc nghiệm</h2>
<!--  <p>👉 Dán văn bản đầu vào tại đây:</p> -->
  <textarea id="input" placeholder="Dán nội dung ở đây..."></textarea>

  <div class="buttons">
    <button onclick="convert()">🔄 Chuyển đổi</button>
    <button onclick="copyOutput()">📋 Copy kết quả</button>
    <button onclick="clearAll()">❌ Xóa nội dung</button>
    <button onclick="window.location.href='index.html'">⬅️ Quay về trang chính</button>
  </div>

 <!-- <h3>Kết quả:</h3> -->
  <pre id="output"></pre>

  <script>
    function convert() {
      const inputText = document.getElementById("input").value;
      const lines = inputText.split("\n");
      let output = "";
      let questionNumber = 1;

      const normalizeAnswer = (line) => {
        const match = line.match(/^(\*\*)?([a-dA-D])[\.\,\)\s]/);
        if (match) {
          let prefix = match[1] ? "**" : "";
          let letter = match[2].toLowerCase();
          let content = line.replace(/^(\*\*)?[a-dA-D][\.\,\)\s]+/, "").trim();
          let result = `${prefix}${letter}) ${content}`;
          return match[1] ? result + "**" : result;
        }
        return line.trim();
      };

      lines.forEach(line => {
        let trimmed = line.trim();

        if (/^\d+[\.,\)]/.test(trimmed) || /^\d+\s/.test(trimmed)) {
          let content = trimmed.replace(/^\d+[\.,\)\s]*/, "");
          output += `${questionNumber}. ${content}\n`;
          questionNumber++;
        } else if (/^(\*\*)?[a-dA-D][\.\,\)\s]/.test(trimmed)) {
          output += normalizeAnswer(trimmed) + "\n";
        } else {
          output += trimmed + "\n";
        }
      });

      document.getElementById("output").textContent = output.trim();
    }

    function copyOutput() {
      const text = document.getElementById("output").textContent;
      const tempTextarea = document.createElement("textarea");
      tempTextarea.value = text;
      document.body.appendChild(tempTextarea);
      tempTextarea.select();
      try {
        document.execCommand("copy");
        alert("✅ Đã sao chép kết quả!");
      } catch (err) {
        alert("❌ Sao chép thất bại.");
      }
      document.body.removeChild(tempTextarea);
    }

    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("output").textContent = "";
    }
  </script>
</body>
</html>
