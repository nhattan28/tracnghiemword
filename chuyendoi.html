<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chuẩn hóa Câu hỏi Trắc nghiệm</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; }
    textarea { width: 100%; height: 300px; margin-bottom: 10px; }
    pre { background: #f0f0f0; padding: 10px; white-space: pre-wrap; border: 1px solid #ccc; }
    button { padding: 8px 12px; margin-right: 8px; }
  </style>
</head>
<body>
  <h2>📌 Chuyển định dạng Câu hỏi trắc nghiệm</h2>
  <p>👉 Dán văn bản đầu vào tại đây:</p>
  <textarea id="input" placeholder="Dán nội dung ở đây..."></textarea>
  <br>
  <button onclick="convert()">Chuyển đổi</button>
  <button onclick="copyOutput()">📋 Copy kết quả</button>

  <h3>Kết quả:</h3>
  <pre id="output"></pre>

  <script>
    function convert() {
      const inputText = document.getElementById("input").value;
      const lines = inputText.split("\n");
      let output = "";
      let questionNumber = 1;

      const normalizeAnswer = (line) => {
        const match = line.match(/^(\*\*)?([a-dA-D])[\.\,\)\s]/);
        if (match) {
          let prefix = match[1] ? "**" : "";
          let letter = match[2].toLowerCase();
          let content = line.replace(/^(\*\*)?[a-dA-D][\.\,\)\s]+/, "").trim();
          let result = `${prefix}${letter}) ${content}`;
          return match[1] ? result + "**" : result;
        }
        return line.trim();
      };

      lines.forEach(line => {
        let trimmed = line.trim();

        // Nhận diện câu hỏi
        if (/^\d+[\.,\)]/.test(trimmed) || /^\d+\s/.test(trimmed)) {
          let content = trimmed.replace(/^\d+[\.,\)\s]*/, "");
          output += `${questionNumber}. ${content}\n`;
          questionNumber++;
        }
        // Đáp án
        else if (/^(\*\*)?[a-dA-D][\.\,\)\s]/.test(trimmed)) {
          output += normalizeAnswer(trimmed) + "\n";
        }
        // Không rõ, giữ nguyên
        else {
          output += trimmed + "\n";
        }
      });

      document.getElementById("output").textContent = output.trim();
    }

function copyOutput() {
  const text = document.getElementById("output").textContent;
  const tempTextarea = document.createElement("textarea");
  tempTextarea.value = text;
  document.body.appendChild(tempTextarea);
  tempTextarea.select();
  try {
    document.execCommand("copy");
    alert("✅ Đã sao chép kết quả!");
  } catch (err) {
    alert("❌ Sao chép thất bại.");
  }
  document.body.removeChild(tempTextarea);
}

  </script>
</body>
</html>
