<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trắc nghiệm Lung Linh</title>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      color: #333;
    }

    @keyframes gradientFlow {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background-color: rgba(255,255,255,0.9);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #2c3e50;
    }

    .note {
      background-color: #fff8c6;
      padding: 10px;
      border-left: 4px solid #f1c40f;
      margin-bottom: 20px;
    }

    .question-block {
      display: none;
      border-radius: 12px;
      background: linear-gradient(-45deg, #ffecd2, #fcb69f, #ff9a9e, #fad0c4);
      background-size: 400% 400%;
      animation: glow 10s ease infinite;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    @keyframes glow {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    button {
      background-color: #ff7675;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #d63031;
    }

    #optionsContainer label {
      display: block;
      margin-bottom: 10px;
      background: #ffffffaa;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #ccc;
    }

    input[type="file"] {
      margin: 10px 0;
    }

    .result {
      margin-top: 30px;
      background: #dff9fb;
      padding: 20px;
      border-radius: 10px;
      border-left: 5px solid #00cec9;
    }

    .correct { color: #27ae60; }
    .wrong { color: #e74c3c; }

    canvas#confetti {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      z-index: 99999;
      text-align: center;
    }

    .popup button {
      margin: 10px;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 99998;
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="container">
    <h2>🌟 Trắc nghiệm Lung Linh 🌟</h2>
    <div class="note">📌 <strong>Lưu ý:</strong> Đáp án đúng cần in <strong>đậm</strong> trong file Word.</div>
    <input type="file" id="upload" accept=".docx" />
    <div id="startQuiz" style="display:none;">
      <button onclick="startQuiz()">🎯 Bắt đầu</button>
    </div>

    <div id="quizContainer" class="question-block">
      <div id="questionText"></div>
      <div id="optionsContainer"></div>
      <button onclick="nextQuestion()">➡️ Tiếp</button>
    </div>

    <div id="progressBar" style="margin-top: 20px; font-weight: bold; text-align: center;">0 / 0 câu đã làm</div>
    <div class="result" id="result"></div>
    <div style="text-align:center;">
      <button onclick="confirmRestart()">🔄 Làm lại</button>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="popup" id="popup">
    <div id="popupMessage"></div>
    <div id="popupButtons">
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

  <script>
    const encouragements = [
      "Đừng nản, bạn đang làm rất tốt! 💪",
      "Thử lại nhé, bạn sẽ làm được! 🌟",
      "Mỗi lần sai là một lần học! 📘",
      "Bạn đang tiến bộ đấy! 🚀",
      "Giữ vững tinh thần nhé! 💖"
    ];

    let rawQuestions = [];
    let current = 0;
    let userAnswers = [];
    let quizStarted = false;
    const confetti = new ConfettiGenerator({ target: 'confetti' });

    document.getElementById("upload").addEventListener("change", function (event) {
      const reader = new FileReader();
      reader.onload = function () {
        mammoth.convertToHtml({ arrayBuffer: reader.result }).then(function (result) {
          const html = result.value;
          parseQuestions(html);
          document.getElementById("startQuiz").style.display = "block";
        });
      };
      reader.readAsArrayBuffer(event.target.files[0]);
    });

    function parseQuestions(html) {
      const container = document.createElement("div");
      container.innerHTML = html;
      const paras = container.querySelectorAll("p");
      rawQuestions = [];
      let currentQ = null;

      paras.forEach(p => {
        const text = p.innerText.trim();
        const isBold = p.querySelector("strong");
        const isYellow = p.innerHTML.includes("highlight") || p.innerHTML.includes("background-color:#ffff00");

        if (/^\d+\./.test(text)) {
          if (currentQ) rawQuestions.push(currentQ);
          currentQ = { question: text, options: [], correctIndex: null };
        } else if (/^[a-dA-D][).]/.test(text) && currentQ) {
          const label = text.substring(0, 2);
          const content = text.substring(2).trim();
          const full = label + " " + content;
          const idx = currentQ.options.length;
          currentQ.options.push({ text: full, isCorrect: (isBold || isYellow) });
        }
      });

      if (currentQ) rawQuestions.push(currentQ);
    }

    function startQuiz() {
      quizStarted = true;
      shuffleArray(rawQuestions);
      rawQuestions.forEach(q => {
        shuffleArray(q.options);
        q.correctIndex = q.options.findIndex(opt => opt.isCorrect);
      });
      document.getElementById("startQuiz").style.display = "none";
      document.getElementById("quizContainer").style.display = "block";
      userAnswers = [];
      current = 0;
      showQuestion();
    }

    function showQuestion() {
      const q = rawQuestions[current];
      document.getElementById("questionText").innerHTML = `<h3>${q.question}</h3>`;
      const optContainer = document.getElementById("optionsContainer");
      optContainer.innerHTML = "";

      q.options.forEach((opt, idx) => {
        optContainer.innerHTML += `<label><input type="radio" name="option" value="${idx}"> ${opt.text}</label>`;
      });

      updateProgress();
    }

    function nextQuestion() {
      const selected = document.querySelector('input[name="option"]:checked');
      if (!selected) {
        showPopup("Bạn phải chọn một đáp án.");
        return;
      }

      userAnswers.push(parseInt(selected.value));
      current++;

      if (current < rawQuestions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function updateProgress() {
      const done = current;
      const total = rawQuestions.length;
      document.getElementById("progressBar").textContent = `${done} / ${total} câu đã làm`;
    }

    function showResult() {
      quizStarted = false;
      document.getElementById("quizContainer").style.display = "none";
      const total = rawQuestions.length;
      let correct = 0;
      let wrongList = [];

      rawQuestions.forEach((q, i) => {
        if (userAnswers[i] === q.correctIndex) {
          correct++;
        } else {
          wrongList.push({
            question: q.question,
            yourAnswer: q.options[userAnswers[i]]?.text || "Không chọn",
            correctAnswer: q.options[q.correctIndex].text
          });
        }
      });

      const score = ((correct / total) * 10).toFixed(2);
      let html = `<h3>Kết quả</h3>
        <p>Điểm: <strong>${score}/10</strong></p>
        <p>Đúng: ${correct}/${total}</p>
        <p>Sai: ${wrongList.length}</p>`;

      if (wrongList.length > 0) {
        html += `<p style="color:#e17055;">💌 ${encouragements[Math.floor(Math.random()*encouragements.length)]}</p>`;
        html += `<h4>Câu sai:</h4><ul>`;
        wrongList.forEach(w => {
          html += `<li><strong>${w.question}</strong><br>
            Bạn chọn: <span class="wrong">${w.yourAnswer}</span><br>
            Đáp án đúng: <span class="correct">${w.correctAnswer}</span></li>`;
        });
        html += `</ul>`;
      } else {
        html += `<p>🎉 Xuất sắc! Bạn đã trả lời đúng tất cả câu hỏi!</p>`;
        confetti.render();
        setTimeout(() => confetti.clear(), 5000);
      }

      document.getElementById("result").innerHTML = html;
      updateProgress();
    }

    function confirmRestart() {
      showPopup("Bạn có chắc muốn làm lại bài?", true);
    }

    function restartQuiz() {
      document.getElementById("result").innerHTML = "";
      document.getElementById("quizContainer").style.display = "block";
      shuffleArray(rawQuestions);
      rawQuestions.forEach(q => {
        shuffleArray(q.options);
        q.correctIndex = q.options.findIndex(opt => opt.isCorrect);
      });
      userAnswers = [];
      current = 0;
      quizStarted = true;
      showQuestion();
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    // 🛑 Không cho chuyển tab hoặc thu nhỏ cửa sổ
    document.addEventListener("visibilitychange", () => {
      if (quizStarted && document.hidden) {
        quizStarted = false;
        showPopup("Bạn đã chuyển tab hoặc thu nhỏ cửa sổ. Bài làm đã kết thúc.");
        document.getElementById("quizContainer").style.display = "none";
      }
    });

    window.addEventListener("resize", () => {
      if (quizStarted && window.outerWidth < 800) {
        quizStarted = false;
        showPopup("Bạn đã thu nhỏ cửa sổ. Bài làm đã kết thúc.");
        document.getElementById("quizContainer").style.display = "none";
      }
    });

    function showPopup(message, confirm = false) {
      const overlay = document.getElementById("overlay");
      const popup = document.getElementById("popup");
      const messageDiv = document.getElementById("popupMessage");
      const buttons = document.getElementById("popupButtons");

      messageDiv.textContent = message;
      overlay.style.display = "block";
      popup.style.display = "block";
      buttons.innerHTML = "";

      if (confirm) {
        const yesBtn = document.createElement("button");
        yesBtn.textContent = "Có";
        yesBtn.onclick = () => {
          closePopup();
          restartQuiz();
        };
        const noBtn = document.createElement("button");
        noBtn.textContent = "Không";
        noBtn.onclick = closePopup;
        buttons.appendChild(yesBtn);
        buttons.appendChild(noBtn);
      } else {
        const okBtn = document.createElement("button");
        okBtn.textContent = "OK";
        okBtn.onclick = closePopup;
        buttons.appendChild(okBtn);
      }
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("overlay").style.display = "none";
    }
  </script>
</body>
</html>
