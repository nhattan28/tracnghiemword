<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chuyển Văn Bản Thành Word</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(-45deg, #ff9ff3, #feca57, #48dbfb, #1dd1a1);
      background-size: 400% 400%;
      animation: glow 15s ease infinite;
      color: #2d3436;
    }

    @keyframes glow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      color: #d63031;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 20px;
      box-sizing: border-box;
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 10px;
    }

    button {
      background-color: #ff7675;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      min-width: 180px;
    }

    button:hover {
      background-color: #d63031;
    }
  </style>

  <!-- Thư viện tạo file .docx -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.7.0/docx.umd.min.js"></script>
</head>
<body>

  <h2>Chuyển Văn Bản Thành File Word</h2>

  <textarea id="textInput" placeholder="Nhập văn bản tại đây..."></textarea>
  <input type="text" id="filenameInput" placeholder="Nhập tên file Word (không cần .docx)" />

  <div class="buttons">
    <button onclick="generateWord()">Chuyển thành Word</button>
    <button onclick="window.location.href='index.html'">⬅️ Quay về trang chính</button>
    <button onclick="window.location.href='chuyendoi.html'">Chuẩn hóa câu hỏi</button>
  </div>

  <script>
    async function generateWord() {
      const rawText = document.getElementById("textInput").value.trim();
      const filename = document.getElementById("filenameInput").value.trim();

      if (!rawText) {
        alert("Vui lòng nhập nội dung văn bản.");
        return;
      }
      if (!filename) {
        alert("Vui lòng nhập tên file Word.");
        return;
      }

      const { Document, Packer, Paragraph, TextRun } = window.docx;

      const paragraphs = rawText.split(/\n+/).map(line =>
        new Paragraph({
          children: [new TextRun(line)],
        })
      );

      const doc = new Document({
        sections: [{
          properties: {},
          children: paragraphs
        }]
      });

      const blob = await Packer.toBlob(doc);

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename + ".docx";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>

</body>
</html>
