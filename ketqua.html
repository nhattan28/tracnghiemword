<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kết quả bài kiểm tra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-gray-100">
  <div class="container mx-auto p-4 max-w-5xl bg-white rounded-lg shadow mt-6">
    <h1 class="text-3xl font-bold text-center mb-6 text-blue-700">Kết quả bài kiểm tra</h1>

    <div class="text-center text-xl mb-4">
      <p>🎯 Điểm: <span class="font-bold text-green-600" id="score">0</span></p>
      <p>✅ Đúng: <span id="correct" class="text-green-600 font-semibold">0</span> / <span id="total">0</span></p>
      <p>⏱️ Thời gian làm bài: <span id="time" class="text-blue-600"></span></p>
    </div>

    <div id="detailed-results">
      <h2 class="text-2xl font-bold mb-4 text-red-600">❌ Các câu trả lời sai:</h2>
      <!-- Các câu sai sẽ hiển thị ở đây -->
    </div>

    <div class="text-center mt-8">
      <a href="index.html" class="inline-block bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">Làm lại bài kiểm tra</a>
    </div>
  </div>

  <!-- Pháo hoa -->
  <canvas id="confetti-canvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50"></canvas>

  <script>
    const score = localStorage.getItem("quizScore") || "0.00";
    const correct = parseInt(localStorage.getItem("quizCorrect")) || 0;
    const total = parseInt(localStorage.getItem("quizTotal")) || 0;
    const time = localStorage.getItem("quizTime") || "00:00";
    const wrongAnswers = JSON.parse(localStorage.getItem("quizWrongAnswers")) || [];

    document.getElementById("score").textContent = score;
    document.getElementById("correct").textContent = correct;
    document.getElementById("total").textContent = total;
    document.getElementById("time").textContent = time;

    const adviceList = [
      "Ôn lại khái niệm cơ bản của chương này.",
      "Xem kỹ phần lý thuyết liên quan đến câu hỏi.",
      "Chú ý các từ khóa chính trong câu hỏi.",
      "Đọc kỹ đề và các lựa chọn trước khi chọn.",
      "Xem lại ví dụ hoặc bài giảng liên quan.",
    ];

    const resultContainer = document.getElementById("detailed-results");

    if (wrongAnswers.length === 0) {
      resultContainer.innerHTML = `<p class="text-green-700 text-center text-lg font-semibold mt-4">🎉 Bạn đã trả lời đúng tất cả các câu hỏi!</p>`;
    } else {
      wrongAnswers.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "border border-red-200 p-4 rounded mb-4 bg-red-50";
        card.innerHTML = `
          <h3 class="font-semibold text-lg mb-2">${index + 1}. ${item.question}</h3>
          <p>✅ Đáp án đúng: <span class="text-green-600 font-semibold">${item.correct}</span></p>
          <p>❌ Bạn chọn: <span class="text-red-600 font-semibold">${item.selected || "Không chọn"}</span></p>
          <p class="italic mt-2 text-yellow-700">👉 Lời khuyên: ${adviceList[index % adviceList.length]}</p>
        `;
        resultContainer.appendChild(card);
      });
    }

    // 🎉 Hiệu ứng pháo hoa nếu đúng 100%
    if (correct === total && total > 0) {
      const duration = 3 * 1000;
      const animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 2000 };

      function shootConfetti() {
        confetti({
          particleCount: 80,
          origin: { x: Math.random(), y: Math.random() * 0.6 },
          ...defaults
        });
        if (Date.now() < animationEnd) {
          requestAnimationFrame(shootConfetti);
        }
      }
      shootConfetti();
    }
  </script>
</body>
</html>
