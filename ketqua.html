<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f2f6;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    h2 {
      color: #2d3436;
    }
    .correct { color: #27ae60; }
    .wrong { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Kết quả bài làm</h2>
    <div id="resultContent">Đang tải...</div>
  </div>

  <script>
    const resultHTML = sessionStorage.getItem("quizResult");
    document.getElementById("resultContent").innerHTML = resultHTML || "Không tìm thấy kết quả.";
  </script>
</body>
</html>
