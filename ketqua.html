<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kết quả</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background-color: #f1f2f6;
      padding-top: 50px;
    }
    .result-box {
      display: inline-block;
      padding: 30px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    .score {
      font-size: 48px;
      font-weight: bold;
      color: #27ae60;
    }
    .summary {
      font-size: 20px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="result-box">
    <h2>🎉 Kết quả bài làm 🎉</h2>
    <div class="score" id="score">0</div>
    <div class="summary" id="summary"></div>
    <div class="summary" id="time"></div>
    <button onclick="window.location.href='index.html'">🔄 Làm lại</button>
  </div>

  <script>
    const score = localStorage.getItem("quizScore");
    const correct = localStorage.getItem("quizCorrect");
    const total = localStorage.getItem("quizTotal");
    const time = localStorage.getItem("quizTime");

    document.getElementById("score").textContent = `${score} điểm`;
    document.getElementById("summary").textContent = `Bạn đúng ${correct} / ${total} câu.`;
    document.getElementById("time").textContent = `Thời gian làm bài: ${time}`;
  </script>
</body>
</html>
