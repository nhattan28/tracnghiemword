<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      color: #2d3436;
    }
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .container {
      width: 90%;
      max-width: 1000px;
      margin: 20px auto;
      padding: 24px;
      background-color: rgba(255,255,255,0.95);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
    }
    .summary {
      background: #dff9fb;
      padding: 15px;
      border-left: 5px solid #00cec9;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .wrong-answer {
      margin-bottom: 20px;
      background: #ffeaa7;
      padding: 15px;
      border-left: 5px solid #e17055;
      border-radius: 10px;
    }
    .wrong-answer p {
      margin: 6px 0;
    }
    .label {
      font-weight: bold;
    }
    .back-button {
      display: block;
      text-align: center;
      margin-top: 30px;
    }
    .back-button button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #ff7675;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
    .back-button button:hover {
      background-color: #d63031;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📊 Kết quả làm bài</h2>
    <div class="summary" id="summary"></div>
    <div id="wrongAnswers"></div>
    <div class="back-button">
      <button onclick="window.location.href='index.html'">🔁 Làm lại bài khác</button>
    </div>
  </div>

  <script>
    const score = localStorage.getItem("quizScore");
    const correct = localStorage.getItem("quizCorrect");
    const total = localStorage.getItem("quizTotal");
    const time = localStorage.getItem("quizTime");

    const summary = document.getElementById("summary");
    summary.innerHTML = `
      ✅ <strong>Điểm:</strong> ${score} / 10<br>
      ✔️ <strong>Số câu đúng:</strong> ${correct}/${total}<br>
      ⏱️ <strong>Thời gian làm bài:</strong> ${time}
    `;

    const wrongAnswers = JSON.parse(localStorage.getItem("quizWrongAnswers") || "[]");
    const wrongContainer = document.getElementById("wrongAnswers");

    if (wrongAnswers.length === 0) {
      wrongContainer.innerHTML = "<p style='text-align:center; font-weight:bold;'>🎉 Chúc mừng bạn đã làm đúng tất cả câu hỏi!</p>";
    } else {
      wrongAnswers.forEach((item, i) => {
        wrongContainer.innerHTML += `
          <div class="wrong-answer">
            <p><span class="label">Câu ${i + 1}:</span> ${item.question}</p>
            <p><span class="label">Đáp án bạn chọn:</span> <span style="color: red;">${item.selected}</span></p>
            <p><span class="label">Đáp án đúng:</span> <span style="color: green;">${item.correct}</span></p>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
